name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Build frontend
        run: npm run build

      - name: Install Python build tools
        run: pip install build

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NUMBER="${TAG#v}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          # Extract the section for this version (between first ## and second ##)
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Get content between the version header and the next version header
          NOTES=$(awk "/^## v${VERSION//./\\.}/{found=1; next} /^## v[0-9]/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file for multiline support
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Copilot Console ${{ steps.version.outputs.TAG }}
          body_path: release_notes.txt
          files: dist/*.whl
          draft: false
          prerelease: false
