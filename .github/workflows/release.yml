name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Install Python build tools
        run: pip install build

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NUMBER="${TAG#v}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Copilot Console ${{ steps.version.outputs.TAG }}
          body: |
            ### ✨ New Features
            - **[Ask] button on pins** — quote a pinned message + your note directly into the chat input
            - **Auto-open pins drawer** — creating a pin opens the drawer and focuses the note field
            - **Textarea auto-sizing** — pin notes grow from 1 to 5 lines as you type

            ### 🔧 Improvements
            - **Inline delete confirmation** for pins (✕ → "Delete? Yes · Cancel")
            - **Folder picker** — selecting the same folder is now a no-op; dialog stays accessible during agent responses
            - **Startup resilience** — retry with backoff for session list and read/unread state on dev server restart
            - **Cleaner server logs** — console shows only important messages; full debug in log files
            - **`--verbose` flag** to enable debug console output
            - **App update banner** shows the correct one-line installer command in case there is a newer version

            ### 🐛 Bug Fixes
            - Fixed all sessions showing as unread (blue dot) after dev server restart
            - Fixed Sidebar test failures (missing mock for `subscribeToActiveAgents`)

            ---

            ## Installation

            ```powershell
            # One-line installer (recommended)
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex

            # Or manual install with pipx
            pipx install --force https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.TAG }}/copilot_console-${{ steps.version.outputs.VERSION_NUMBER }}-py3-none-any.whl
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: dist/*.whl
          draft: false
          prerelease: false
