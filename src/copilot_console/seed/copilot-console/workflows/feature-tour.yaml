kind: Workflow
name: feature-tour
description: |
  Guided tour of the new workflow features.

  ⚠ Before clicking ▶ Run, type a topic into the "Input message (optional)"
  field — e.g. "sunsets" or "a sleepy cat". The Creative Poet uses that as
  the poem topic. (Threading a Question answer into the agent would require
  PowerFx expressions, unavailable on Python 3.14+.)

  You'll see:
    1. A multiple-choice Question — HITL question row with three buttons
    2. A yes/no Confirmation — HITL confirmation row with custom labels
    3. Creative Poet streams a poem on the topic you typed
    4. Click 📊 Diagram in the toolbar — YAML overlay of the flow

  (TryCatch was removed from this demo: agent_framework_declarative
  does not wire TryCatch/ThrowException as top-level YAML actions —
  they would be silently skipped by the builder. The 'Executor failed'
  badge styling still kicks in for any real executor failure, e.g. a
  missing agent or network error.)
trigger:
  kind: OnConversationStart
  id: feature_tour
  actions:
    - kind: SendActivity
      id: intro
      activity: "👋 Welcome to the feature tour. Watch the live viewer on the right."

    # ---- HITL #1: Question with choices -> HumanInputRow renders buttons.
    # Note: without PowerFx we can't thread Local.topic into the agent below;
    # this step is here to demonstrate the question-with-choices HITL pattern.
    - kind: Question
      id: pick_mood
      variable: Local.mood
      prompt: "Pick a mood for the poem (decorative — actual topic comes from the Input message field)"
      choices:
        - playful
        - reflective
        - dramatic

    # ---- HITL #2: Confirmation -> HumanInputRow renders Yes/No.
    - kind: Confirmation
      id: confirm_proceed
      text: "Ready to invoke the Creative Poet on your topic?"
      yesLabel: Write the poem
      noLabel: Cancel

    # ---- Real agent invocation. Receives the conversation's initial
    # message (the "Input message" field) as its prompt.
    - kind: InvokeAzureAgent
      id: write_poem
      agent:
        name: Creative Poet

    - kind: SendActivity
      id: outro
      activity: "🎉 Tour complete. Click 📊 Diagram in the toolbar to see the YAML overlay."

