kind: Workflow
name: feature-tour
description: |
  Guided tour of the workflow features that work on Python 3.14
  (no PowerFx required). Leave the "Input message (optional)" field
  blank — the workflow asks for the topic interactively.

  You'll see:
    1. SendActivity — the intro banner
    2. Question with choices — HITL row with three buttons (mood)
    3. Question free-text — HITL row with a text box (poem topic;
       written to Local.userInput, which InvokeAzureAgent reads
       automatically as its implicit input fallback)
    4. InvokeAzureAgent — Creative Poet streams a poem on the topic
    5. The mermaid diagram in the right pane is the YAML overlay
       (built by visualize_overlay; append ?raw=true to the URL for
       AF's auto-generated version)

  (Confirmation, If/Switch and TryCatch were left out: they require
  PowerFx expression evaluation to gate behavior, and PowerFx wheels
  are not available on Python 3.14+. See feature-tour-advanced for a
  workflow that exercises those features on 3.10–3.13.)
trigger:
  kind: OnConversationStart
  id: feature_tour
  actions:
    - kind: SendActivity
      id: intro
      activity: "👋 Welcome to the feature tour. Watch the live viewer on the right."

    # ---- HITL #1: Question with choices -> HumanInputRow renders buttons.
    # Decorative — shows off the choices UI. Stored in Local.mood (unused).
    - kind: Question
      id: pick_mood
      property: Local.mood
      text: "Pick a mood for the poem (just for show — any choice works)"
      choices:
        - playful
        - reflective
        - dramatic

    # ---- HITL #2: Free-text Question. Writes to Local.userInput, which is
    # the implicit fallback InvokeAzureAgent reads when no `input:` is set.
    # This is how we thread the topic into the agent without PowerFx.
    - kind: Question
      id: ask_topic
      property: Local.userInput
      text: "What topic should the poem be about? (e.g. sunsets, a sleepy cat, quantum physics)"
      allowFreeText: true

    # ---- Real agent invocation. With no `input:` field the executor falls
    # back to Local.userInput (set by ask_topic above).
    - kind: InvokeAzureAgent
      id: write_poem
      agent:
        name: Creative Poet

    - kind: SendActivity
      id: outro
      activity: "🎉 Tour complete. The mermaid diagram on the right is the YAML overlay."

