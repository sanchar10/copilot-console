kind: Workflow
name: feature-tour
description: |
  Guided tour of the new workflow features. Click ▶ Run to see:
    1. A multiple-choice Question (HITL question row)
    2. A yes/no Confirmation (HITL confirmation row)
    3. A TryCatch that triggers and recovers from an error (red "Executor failed" badge + 3-lane TryCatch in the YAML diagram)
    4. The Creative Poet agent writing on your chosen topic
  No PowerFx expressions are used, so this runs everywhere.
trigger:
  kind: OnConversationStart
  id: feature_tour
  actions:
    - kind: SendActivity
      id: intro
      activity: "👋 Welcome to the feature tour. Watch the live viewer on the right."

    # ---- HITL #1: Question with choices -> HumanInputRow renders buttons
    - kind: Question
      id: pick_topic
      variable: Local.topic
      prompt: "Pick a topic for the poem"
      choices:
        - sunsets
        - quantum physics
        - a sleepy cat

    # ---- HITL #2: Confirmation -> HumanInputRow renders Yes/No
    - kind: Confirmation
      id: confirm_demo_error
      text: "Next we'll deliberately trigger an error to demo TryCatch recovery. Continue?"
      yesLabel: Trigger error
      noLabel: Skip

    # ---- TryCatch: shows the 3-lane mermaid + "Executor failed" badge in the
    #      event log when the throw fires, then the catch lane runs cleanly.
    - kind: TryCatch
      id: demo_recovery
      try:
        - kind: SendActivity
          id: about_to_throw
          activity: "About to raise a controlled error..."
        - kind: ThrowException
          id: boom
          message: "Demo error — this is intentional and will be caught."
          code: DEMO_ERROR
      catch:
        - kind: SendActivity
          id: caught
          activity: "✅ Recovered from the error — the catch lane is running."

    # ---- Real agent invocation, using a seeded agent.
    - kind: InvokeAzureAgent
      id: write_poem
      agent:
        name: Creative Poet

    - kind: SendActivity
      id: outro
      activity: "🎉 Tour complete. Click 📊 Diagram in the toolbar to see the YAML overlay."
